<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" width="860" height="480">
  <defs>
    <style>
      .node { fill: rgba(255,255,255,0.55); }
      .edge { stroke: rgba(255,255,255,0.18); stroke-width: 0.8; fill: none; }
      .ln0 { animation: fl0 4s ease-in-out infinite alternate; }
      .ln1 { animation: fl1 3.5s ease-in-out infinite alternate; }
      .ln2 { animation: fl2 4.2s ease-in-out infinite alternate; }
      .ln3 { animation: fl3 3.8s ease-in-out infinite alternate; }
      .ln4 { animation: fl4 4.5s ease-in-out infinite alternate; }
      .ln5 { animation: fl5 3.2s ease-in-out infinite alternate; }
      .ln6 { animation: fl6 4.8s ease-in-out infinite alternate; }
      .ln7 { animation: fl7 3.6s ease-in-out infinite alternate; }
      @keyframes fl0 { from{transform:translate(0,0)} to{transform:translate(2px,3px)} }
      @keyframes fl1 { from{transform:translate(0,0)} to{transform:translate(-3px,2px)} }
      @keyframes fl2 { from{transform:translate(0,0)} to{transform:translate(2px,-3px)} }
      @keyframes fl3 { from{transform:translate(0,0)} to{transform:translate(-2px,3px)} }
      @keyframes fl4 { from{transform:translate(0,0)} to{transform:translate(3px,-2px)} }
      @keyframes fl5 { from{transform:translate(0,0)} to{transform:translate(-3px,-2px)} }
      @keyframes fl6 { from{transform:translate(0,0)} to{transform:translate(2px,2px)} }
      @keyframes fl7 { from{transform:translate(0,0)} to{transform:translate(-2px,-3px)} }
      .rn0 { animation: rf0 4.1s ease-in-out infinite alternate; }
      .rn1 { animation: rf1 3.7s ease-in-out infinite alternate; }
      .rn2 { animation: rf2 4.3s ease-in-out infinite alternate; }
      .rn3 { animation: rf3 3.9s ease-in-out infinite alternate; }
      .rn4 { animation: rf4 4.6s ease-in-out infinite alternate; }
      .rn5 { animation: rf5 3.3s ease-in-out infinite alternate; }
      .rn6 { animation: rf6 4.9s ease-in-out infinite alternate; }
      .rn7 { animation: rf7 3.7s ease-in-out infinite alternate; }
      @keyframes rf0 { from{transform:translate(0,0)} to{transform:translate(-2px,3px)} }
      @keyframes rf1 { from{transform:translate(0,0)} to{transform:translate(3px,-2px)} }
      @keyframes rf2 { from{transform:translate(0,0)} to{transform:translate(-3px,2px)} }
      @keyframes rf3 { from{transform:translate(0,0)} to{transform:translate(2px,3px)} }
      @keyframes rf4 { from{transform:translate(0,0)} to{transform:translate(-2px,-3px)} }
      @keyframes rf5 { from{transform:translate(0,0)} to{transform:translate(3px,2px)} }
      @keyframes rf6 { from{transform:translate(0,0)} to{transform:translate(2px,-3px)} }
      @keyframes rf7 { from{transform:translate(0,0)} to{transform:translate(-3px,-2px)} }
      .pulse { stroke: rgba(180,210,255,0.9); stroke-width: 1.5; fill: none; stroke-dasharray: 30 200; stroke-dashoffset: 200; }
      .p1 { animation: dash1 3s linear infinite; }
      .p2 { animation: dash2 3.5s linear infinite 0.5s; }
      .p3 { animation: dash3 4s linear infinite 1s; }
      .p4 { animation: dash4 3.2s linear infinite 1.5s; }
      .p5 { animation: dash5 3.8s linear infinite 0.3s; }
      .p6 { animation: dash6 4.2s linear infinite 0.8s; }
      @keyframes dash1 { from{stroke-dashoffset:200} to{stroke-dashoffset:-30} }
      @keyframes dash2 { from{stroke-dashoffset:200} to{stroke-dashoffset:-30} }
      @keyframes dash3 { from{stroke-dashoffset:200} to{stroke-dashoffset:-30} }
      @keyframes dash4 { from{stroke-dashoffset:200} to{stroke-dashoffset:-30} }
      @keyframes dash5 { from{stroke-dashoffset:200} to{stroke-dashoffset:-30} }
      @keyframes dash6 { from{stroke-dashoffset:200} to{stroke-dashoffset:-30} }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="220" fill="#0d0d0d"/>

  <!-- LEFT edges -->
  <line class="edge" x1="30" y1="60" x2="90" y2="30"/>
  <line class="edge" x1="90" y1="30" x2="160" y2="50"/>
  <line class="edge" x1="30" y1="60" x2="50" y2="120"/>
  <line class="edge" x1="90" y1="30" x2="130" y2="100"/>
  <line class="edge" x1="160" y1="50" x2="130" y2="100"/>
  <line class="edge" x1="50" y1="120" x2="130" y2="100"/>
  <line class="edge" x1="50" y1="120" x2="80" y2="180"/>
  <line class="edge" x1="130" y1="100" x2="80" y2="180"/>
  <line class="edge" x1="130" y1="100" x2="170" y2="150"/>
  <line class="edge" x1="80" y1="180" x2="170" y2="150"/>
  <line class="edge" x1="80" y1="180" x2="30" y2="170"/>
  <line class="edge" x1="170" y1="150" x2="30" y2="170"/>
  <!-- LEFT pulse -->
  <line class="pulse p1" x1="30" y1="60" x2="90" y2="30"/>
  <line class="pulse p2" x1="160" y1="50" x2="130" y2="100"/>
  <line class="pulse p3" x1="50" y1="120" x2="80" y2="180"/>
  <line class="pulse p4" x1="130" y1="100" x2="170" y2="150"/>
  <line class="pulse p5" x1="90" y1="30" x2="130" y2="100"/>
  <line class="pulse p6" x1="80" y1="180" x2="30" y2="170"/>
  <!-- LEFT nodes -->
  <circle class="node ln0" cx="30" cy="60" r="2"/>
  <circle class="node ln1" cx="90" cy="30" r="2"/>
  <circle class="node ln2" cx="160" cy="50" r="2"/>
  <circle class="node ln3" cx="50" cy="120" r="2"/>
  <circle class="node ln4" cx="130" cy="100" r="2"/>
  <circle class="node ln5" cx="80" cy="180" r="2"/>
  <circle class="node ln6" cx="170" cy="150" r="2"/>
  <circle class="node ln7" cx="30" cy="170" r="2"/>

  <text x="430" y="95" text-anchor="middle" font-family="Georgia,serif" font-size="46" font-weight="300" fill="white" letter-spacing="1">SardorCoder</text>
  <text x="430" y="155" text-anchor="middle" font-family="Georgia,serif" font-size="38" font-weight="300" fill="white" letter-spacing="2">Web Developer</text>

  <g transform="translate(640,0)">
    <line class="edge" x1="60" y1="30" x2="150" y2="50"/>
    <line class="edge" x1="150" y1="50" x2="190" y2="80"/>
    <line class="edge" x1="60" y1="30" x2="30" y2="90"/>
    <line class="edge" x1="150" y1="50" x2="120" y2="110"/>
    <line class="edge" x1="190" y1="80" x2="120" y2="110"/>
    <line class="edge" x1="30" y1="90" x2="120" y2="110"/>
    <line class="edge" x1="30" y1="90" x2="60" y2="160"/>
    <line class="edge" x1="120" y1="110" x2="60" y2="160"/>
    <line class="edge" x1="120" y1="110" x2="170" y2="140"/>
    <line class="edge" x1="60" y1="160" x2="170" y2="140"/>
    <line class="edge" x1="60" y1="160" x2="190" y2="190"/>
    <line class="edge" x1="170" y1="140" x2="190" y2="190"/>
    <!-- RIGHT pulse -->
    <line class="pulse p2" x1="60" y1="30" x2="150" y2="50"/>
    <line class="pulse p3" x1="190" y1="80" x2="120" y2="110"/>
    <line class="pulse p4" x1="30" y1="90" x2="60" y2="160"/>
    <line class="pulse p5" x1="120" y1="110" x2="170" y2="140"/>
    <line class="pulse p6" x1="150" y1="50" x2="120" y2="110"/>
    <line class="pulse p1" x1="60" y1="160" x2="190" y2="190"/>
    <!-- RIGHT nodes -->
    <circle class="node rn0" cx="60" cy="30" r="2"/>
    <circle class="node rn1" cx="150" cy="50" r="2"/>
    <circle class="node rn2" cx="190" cy="80" r="2"/>
    <circle class="node rn3" cx="30" cy="90" r="2"/>
    <circle class="node rn4" cx="120" cy="110" r="2"/>
    <circle class="node rn5" cx="60" cy="160" r="2"/>
    <circle class="node rn6" cx="170" cy="140" r="2"/>
    <circle class="node rn7" cx="190" cy="190" r="2"/>
  </g>

  <!-- BIO SECTION -->
  <rect y="220" width="860" height="260" fill="#111111"/>
  <text x="430" y="262" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#cccccc">
    <tspan>Hi there! My name is Sardor, but you might know me as </tspan><tspan font-weight="bold" fill="#ffffff">SardorCoder</tspan><tspan>. I'm a </tspan><tspan font-weight="bold" fill="#ffffff">Software Engineer</tspan><tspan> from </tspan><tspan font-weight="bold" fill="#ffffff">Uzbekistan</tspan><tspan>,</tspan>
  </text>
  <text x="430" y="284" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#cccccc">collaborating with multiple companies and building strong tech networks.</text>
  <text x="430" y="306" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#cccccc">
    <tspan>I enjoy working with </tspan><tspan font-weight="bold" fill="#ffffff">TypeScript</tspan><tspan>, </tspan><tspan font-weight="bold" fill="#ffffff">Next.js</tspan><tspan>, </tspan><tspan font-weight="bold" fill="#ffffff">React Native</tspan><tspan>, and </tspan><tspan font-weight="bold" fill="#ffffff">Node.js</tspan><tspan>. I'm passionate about</tspan>
  </text>
  <text x="430" y="328" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#cccccc">
    <tspan font-weight="bold" fill="#ffffff">Open Source</tspan><tspan> and </tspan><tspan font-weight="bold" fill="#ffffff">Community Growth</tspan><tspan>, and I love sharing my knowledge through tutorials and social media.</tspan>
  </text>

  <text x="430" y="366" text-anchor="middle" font-family="Arial,sans-serif" font-size="13">
    <tspan fill="#6aaff0" text-decoration="underline">portfolio</tspan>
    <tspan fill="#555555"> · </tspan>
    <tspan fill="#6aaff0" text-decoration="underline">projects</tspan>
    <tspan fill="#555555"> · </tspan>
    <tspan fill="#6aaff0" text-decoration="underline">blog</tspan>
    <tspan fill="#555555"> · </tspan>
    <tspan fill="#aaaaaa">platform</tspan>
    <tspan fill="#555555"> · </tspan>
    <tspan fill="#e74c3c" text-decoration="underline">courses</tspan>
    <tspan fill="#555555"> · </tspan>
    <tspan fill="#e74c3c" text-decoration="underline">interviews</tspan>
    <tspan fill="#555555"> · </tspan>
    <tspan fill="#6aaff0" text-decoration="underline">contact</tspan>
  </text>

  <!-- Social buttons -->
  <rect x="238" y="388" width="88" height="28" rx="5" fill="#2ca5e0"/>
  <text x="282" y="406" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">✈ Telegram</text>
  <rect x="334" y="388" width="92" height="28" rx="5" fill="#c13584"/>
  <text x="380" y="406" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">📷 Instagram</text>
  <rect x="434" y="388" width="84" height="28" rx="5" fill="#0077b5"/>
  <text x="476" y="406" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">in LinkedIn</text>
  <rect x="526" y="388" width="84" height="28" rx="5" fill="#ff0000"/>
  <text x="568" y="406" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">▶ YouTube</text>
</svg>